<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Prayer">
<title>Daily Prayer — ACTS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4F5F2;--card:#FCFCFB;--ink:#1F2A2E;--muted:#7C8A83;--line:#E1E5E0;
    --forest:#3E5C50;--forest-soft:#EAF0EC;--gold:#A9791F;--gold-soft:#F6EEDD;--gold-line:#E4CE9E;
    --plum:#6B4A5A;--plum-soft:#F1EAEE;--err:#A6432F;
  }
  @media (prefers-reduced-motion: reduce){ *{animation:none!important;transition:none!important} }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;padding:24px 16px 90px}
  .wrap{max-width:640px;margin:0 auto}

  header{margin-bottom:8px}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:8px}
  h1{font-family:'Fraunces',serif;font-weight:500;font-size:30px;line-height:1.1;letter-spacing:-.01em}
  h1 em{font-style:italic;color:var(--forest)}

  .sec{display:flex;align-items:center;gap:10px;margin:24px 0 12px}
  .sec .lt{font-family:'Fraunces',serif;font-weight:600;font-size:14px;width:24px;height:24px;display:grid;place-items:center;border-radius:6px;color:#fff;flex:none}
  .sec .tt{font-weight:600;font-size:14px}.sec .tt span{color:var(--muted);font-weight:400;margin-left:6px;font-size:13px}
  .sec .rule{flex:1;height:1px;background:var(--line)}

  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 16px;margin-bottom:12px}
  label.fld{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:6px}
  input.box,textarea.box{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-family:'Inter',sans-serif;font-size:14px;color:var(--ink);background:#fff}
  textarea.box{font-family:'Fraunces',serif;font-size:15px;resize:vertical;min-height:56px;line-height:1.45}
  input.box:focus,textarea.box:focus{outline:none;border-color:var(--forest);box-shadow:0 0 0 3px var(--forest-soft)}
  .anchor{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin-top:9px}

  .btn{background:var(--forest);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;padding:10px 18px;margin-top:12px}
  .btn:hover{background:#334E43}
  .btn:disabled{opacity:.5;cursor:default}
  .btn:focus-visible{outline:2px solid var(--forest);outline-offset:2px}
  .btn.sm{padding:6px 12px;font-size:12.5px;margin:0}

  .row{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:13px 14px;margin-bottom:10px}
  .row.answered{border-color:var(--gold-line);background:linear-gradient(180deg,var(--card),#FFFDF8)}
  .row.moved{animation:pop .5s ease}
  @keyframes pop{0%{transform:scale(.97);opacity:.4}100%{transform:scale(1);opacity:1}}
  .rtop{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .rdate{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap;padding-top:2px}
  .rreq{font-family:'Fraunces',serif;font-size:16px;flex:1;line-height:1.3}
  .rscr{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--forest);margin-top:5px}
  .row.answered .rscr{color:var(--gold)}
  .tog{appearance:none;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:11.5px;font-weight:600;color:var(--muted);padding:6px 10px;border-radius:7px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .tog:hover{border-color:var(--forest);color:var(--forest)}
  .tog:focus-visible{outline:2px solid var(--forest);outline-offset:2px}
  .tog .dot{width:8px;height:8px;border-radius:50%;border:1.5px solid currentColor}
  .row.answered .tog{border-color:var(--gold-line);color:var(--gold);background:var(--gold-soft)}
  .row.answered .tog .dot{background:currentColor}
  .stamp{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--gold);margin-top:9px;display:flex;align-items:center;gap:7px}
  .stamp .seal{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--gold);display:grid;place-items:center;font-size:10px}
  .how{font-family:'Fraunces',serif;font-size:14px;color:var(--ink);margin-top:6px;font-style:italic}
  .empty{color:var(--muted);font-style:italic;font-family:'Fraunces',serif;font-size:15px;padding:16px 4px;text-align:center}
  .loading{color:var(--muted);font-size:13px;padding:14px 4px;text-align:center}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--forest);color:#fff;font-size:13.5px;font-weight:600;padding:11px 20px;border-radius:10px;box-shadow:0 6px 20px rgba(31,42,46,.2);opacity:0;pointer-events:none;transition:all .3s ease;z-index:50;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.err{background:var(--err)}

  .setup{background:var(--gold-soft);border:1px solid var(--gold-line);border-radius:10px;padding:12px 14px;font-size:12.5px;color:#6e5214;margin-bottom:18px;line-height:1.5}
  .setup b{font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow"><span>Daily Prayer</span><span id="todayLbl"></span></div>
    <h1>A · C · T · <em>S</em></h1>
  </header>

  <div class="setup" id="setupNote" style="display:none"></div>

  <!-- ADORATION -->
  <div class="sec"><span class="lt" style="background:var(--plum)">A</span><span class="tt">Adoration <span>who God is today</span></span><span class="rule"></span></div>
  <div class="card">
    <label class="fld">Name one thing true of his character</label>
    <textarea class="box" id="adoration" placeholder="You are patient with me — slow to anger…"></textarea>
    <div class="anchor">Anchor · Psalm 145:8</div>
  </div>

  <!-- CONFESSION -->
  <div class="sec"><span class="lt" style="background:var(--plum)">C</span><span class="tt">Confession <span>name it, then receive grace</span></span><span class="rule"></span></div>
  <div class="card">
    <label class="fld">Where do I need to come clean?</label>
    <textarea class="box" id="confession" placeholder="Be honest here…"></textarea>
    <div class="anchor">Anchor · 1 John 1:9 · Psalm 103:12</div>
    <button class="btn" id="saveAC">Save today's A &amp; C</button>
  </div>

  <!-- THANKSGIVING -->
  <div class="sec"><span class="lt" style="background:var(--gold)">T</span><span class="tt">Thanksgiving <span>answered prayers</span></span><span class="rule"></span></div>
  <div id="thanksList"><div class="loading">Loading…</div></div>

  <!-- SUPPLICATION -->
  <div class="sec"><span class="lt" style="background:var(--forest)">S</span><span class="tt">Supplication <span>open — tap to answer</span></span><span class="rule"></span></div>
  <div class="card">
    <label class="fld">New request</label>
    <input class="box" id="newReq" placeholder="e.g. Prep for men's ministry launch">
    <label class="fld" style="margin-top:11px">Scripture (optional)</label>
    <input class="box" id="newScr" placeholder="e.g. Colossians 3:23">
    <button class="btn" id="addReq">Add to Supplication</button>
  </div>
  <div id="suppList"><div class="loading">Loading…</div></div>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){
  // ===== CONFIG — your data sources =====
  var DS_REQUESTS = "0b870b82-1f3a-47a9-92c4-12981d083dc5";  // Prayer Requests
  var DS_REFLECT  = "7598f192-3f3b-42f4-afa0-548c04dc27e1";  // Daily Reflections

  var today = new Date();
  function iso(d){ return d.toISOString().slice(0,10); }              // YYYY-MM-DD for Notion
  function disp(s){ if(!s) return ""; var p=s.split("-"); return (+p[1])+"/"+(+p[2])+"/"+p[0].slice(2); }
  document.getElementById('todayLbl').textContent = disp(iso(today));

  var toastEl=document.getElementById('toast');
  function toast(msg,isErr){ toastEl.textContent=msg; toastEl.className="toast show"+(isErr?" err":""); setTimeout(function(){toastEl.className="toast"},2200); }

  // ===== API proxy helper =====
  async function api(path, method, body){
    var r = await fetch("/api/notion", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ path:path, method:method, body:body })
    });
    var data = await r.json();
    if(!r.ok){ throw new Error(data.error || (data.message||"Request failed")); }
    return data;
  }

  // ===== map a Notion page → simple row =====
  function toRow(page){
    var p = page.properties || {};
    function txt(prop){ var a=(prop&&prop.rich_text)||[]; return a.length?a.map(function(x){return x.plain_text}).join(""):""; }
    function title(prop){ var a=(prop&&prop.title)||[]; return a.length?a.map(function(x){return x.plain_text}).join(""):""; }
    return {
      id: page.id,
      req: title(p["Request"]),
      scripture: txt(p["Scripture"]),
      status: (p["Status"]&&p["Status"].select&&p["Status"].select.name)||"Open",
      dateAsked: (p["Date Asked"]&&p["Date Asked"].date&&p["Date Asked"].date.start)||"",
      dateAnswered: (p["Date Answered"]&&p["Date Answered"].date&&p["Date Answered"].date.start)||"",
      how: txt(p["How Answered"])
    };
  }

  // ===== render a row =====
  var justMoved=null;
  function rowHTML(item){
    var cls="row"+(item.status==="Answered"?" answered":"")+(justMoved===item.id?" moved":"");
    var dateShown = item.status==="Answered" ? "✓ "+disp(item.dateAnswered) : disp(item.dateAsked);
    var scr = item.scripture ? '<div class="rscr">'+item.scripture+'</div>' : '';
    var toggle='<button class="tog" data-id="'+item.id+'"><span class="dot"></span>'+(item.status==="Open"?"Mark answered":"Answered")+'</button>';
    var head='<div class="rtop"><div class="rdate">'+dateShown+'</div><div class="rreq">'+esc(item.req)+scr+'</div>'+toggle+'</div>';
    var extra="";
    if(item.status==="Answered"){
      extra='<div class="stamp"><span class="seal">✓</span>Answered '+disp(item.dateAnswered)+'</div>';
      if(item.how) extra+='<div class="how">'+esc(item.how)+'</div>';
    }
    return '<div class="'+cls+'" data-id="'+item.id+'">'+head+extra+'</div>';
  }
  function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  // ===== load both lists =====
  async function loadLists(){
    try{
      var openRes = await api("/data_sources/"+DS_REQUESTS+"/query","POST",
        { filter:{ property:"Status", select:{ equals:"Open" } }, sorts:[{ property:"Date Asked", direction:"ascending" }] });
      var ansRes = await api("/data_sources/"+DS_REQUESTS+"/query","POST",
        { filter:{ property:"Status", select:{ equals:"Answered" } }, sorts:[{ property:"Date Answered", direction:"descending" }] });

      var open=(openRes.results||[]).map(toRow);
      var ans=(ansRes.results||[]).map(toRow);

      document.getElementById('suppList').innerHTML   = open.length? open.map(rowHTML).join("") : '<div class="empty">All caught up.</div>';
      document.getElementById('thanksList').innerHTML = ans.length?  ans.map(rowHTML).join("")  : '<div class="empty">No answered prayers yet.</div>';
      wireToggles();
      justMoved=null;
    }catch(e){
      showSetup(e.message);
      document.getElementById('suppList').innerHTML='<div class="empty">Couldn\'t load.</div>';
      document.getElementById('thanksList').innerHTML='';
    }
  }

  async function patchAnswer(id, makeAnswered, how){
    var props={
      "Status":{ select:{ name: makeAnswered?"Answered":"Open" } },
      "Date Answered":{ date: makeAnswered? { start: iso(today) } : null }
    };
    if(makeAnswered) props["How Answered"]={ rich_text: how? [{ text:{ content: how } }] : [] };
    else props["How Answered"]={ rich_text: [] };
    await api("/pages/"+id,"PATCH",{ properties: props });
    justMoved=id;
  }

  function wireToggles(){
    document.querySelectorAll('.tog').forEach(function(btn){
      btn.addEventListener('click', async function(){
        var id=btn.getAttribute('data-id');
        var card=document.querySelector('.row[data-id="'+id+'"]');
        var isAnswered = card && card.classList.contains('answered');

        // Un-marking an answered prayer → straight back to Open
        if(isAnswered){
          btn.disabled=true;
          try{ await patchAnswer(id,false,""); toast("Moved back to Supplication"); await loadLists(); }
          catch(e){ toast(e.message,true); btn.disabled=false; }
          return;
        }

        // Marking answered → show inline "how" prompt (only once per card)
        if(card.querySelector('.how-prompt')) return;
        var box=document.createElement('div');
        box.className='how-prompt';
        box.style.cssText='margin-top:11px;padding-top:11px;border-top:1px dashed var(--gold-line)';
        box.innerHTML=''
          + '<label class="fld" style="color:var(--gold)">How did God answer?</label>'
          + '<textarea class="box haInput" placeholder="Write the story while it\'s fresh… (optional)"></textarea>'
          + '<div style="display:flex;gap:8px;margin-top:10px">'
          +   '<button class="btn sm haSave">Save &amp; flip to Thanksgiving</button>'
          +   '<button class="tog haSkip">Skip</button>'
          + '</div>';
        card.appendChild(box);
        var input=box.querySelector('.haInput'); input.focus();

        box.querySelector('.haSave').addEventListener('click', async function(){
          var s=this; s.disabled=true;
          try{ await patchAnswer(id,true,input.value.trim()); toast("✓ Flipped to Thanksgiving"); await loadLists(); }
          catch(e){ toast(e.message,true); s.disabled=false; }
        });
        box.querySelector('.haSkip').addEventListener('click', async function(){
          this.disabled=true;
          try{ await patchAnswer(id,true,""); toast("✓ Flipped to Thanksgiving"); await loadLists(); }
          catch(e){ toast(e.message,true); this.disabled=false; }
        });
      });
    });
  }

  // ===== add request =====
  document.getElementById('addReq').addEventListener('click', async function(){
    var reqEl=document.getElementById('newReq'), scrEl=document.getElementById('newScr');
    var val=reqEl.value.trim(); if(!val){ toast("Type a request first",true); return; }
    var btn=this; btn.disabled=true;
    try{
      var props={
        "Request":{ title:[{ text:{ content: val } }] },
        "Status":{ select:{ name:"Open" } },
        "Date Asked":{ date:{ start: iso(today) } }
      };
      if(scrEl.value.trim()) props["Scripture"]={ rich_text:[{ text:{ content: scrEl.value.trim() } }] };
      await api("/pages","POST",{ parent:{ type:"data_source_id", data_source_id: DS_REQUESTS }, properties: props });
      reqEl.value=""; scrEl.value="";
      toast("✓ Added to Supplication");
      await loadLists();
    }catch(e){ toast(e.message,true); }
    btn.disabled=false;
  });

  // ===== save A & C =====
  document.getElementById('saveAC').addEventListener('click', async function(){
    var a=document.getElementById('adoration').value.trim();
    var c=document.getElementById('confession').value.trim();
    if(!a && !c){ toast("Write A or C first",true); return; }
    var btn=this; btn.disabled=true;
    try{
      var d=today, dayTitle=d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
      await api("/pages","POST",{ parent:{ type:"data_source_id", data_source_id: DS_REFLECT }, properties:{
        "Day":{ title:[{ text:{ content: dayTitle } }] },
        "Date":{ date:{ start: iso(today) } },
        "Adoration":{ rich_text:[{ text:{ content: a } }] },
        "Confession":{ rich_text:[{ text:{ content: c } }] }
      }});
      toast("✓ Saved today's reflection");
      document.getElementById('adoration').value="";
      document.getElementById('confession').value="";
    }catch(e){ toast(e.message,true); }
    btn.disabled=false;
  });

  function showSetup(msg){
    var el=document.getElementById('setupNote');
    el.style.display="block";
    el.innerHTML='<b>Not connected yet.</b> '+esc(msg)+'<br>Check: (1) NOTION_TOKEN set on the server, (2) both databases shared with your integration, (3) the data source IDs above are correct.';
  }

  loadLists();
})();
</script>
</body>
</html>
